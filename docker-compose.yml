version: '3.8'

services:
  # --- The FastAPI Backend (LangGraph & DuckDB) ---
  api:
    build: .
    command: uvicorn src.api.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env

  # --- The Streamlit Frontend ---
  frontend:
    build: .
    command: streamlit run app/main.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    environment:
      # Tell Streamlit to talk to the "api" container, not localhost
      - API_URL=http://api:8000/chat
    depends_on:
      - api
